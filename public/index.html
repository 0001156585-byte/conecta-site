<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ConectaEPT - Login</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="login-body">


<div class="login-box">

<h1>ConectaEPT</h1>

<p>Plataforma de conexão Escola e Empresa</p>


<form id="loginForm">

<input 
id="email"
type="email"
placeholder="E-mail"
required>


<input 
id="senha"
type="password"
placeholder="Senha"
required>


<button>
Entrar
</button>


<p id="mensagem"></p>


</form>

</div>



<script src="js/login.js"></script>

</body>
</html>
